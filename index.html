<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Maísa Trindade Arquitectos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="line"></div>
  <div class="vertical-text">Arquitectos</div>
<div class="socials">
  <a href="https://www.instagram.com/maisatrindadearquitectos" target="_blank">
    <i class="fa-brands fa-instagram"></i>
  </a>

  <a href="https://pt.pinterest.com/maisatrindadearquitectos/" target="_blank">
    <i class="fa-brands fa-pinterest-p"></i>
  </a>

  <a href="https://www.facebook.com/maisatrindadearquitectos/" target="_blank">
    <i class="fa-brands fa-facebook-f"></i>
  </a>
</div>
</div>
<!-- HEADER -->
<header>
  <div class="logo">
    <strong>MAÍSA TRINDADE</strong><br>
    <span>ARQUITECTOS</span>
  </div>

  <nav>
    <a href="#contacto">CONTACTOS</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <img src="https://picsum.photos/1600/900?grayscale">
</section>

<!-- FOOTER -->
<footer id="contacto">
  <div class="footer-grid">

    <div>
      <h4>CONTACTO</h4>
      <p>+351 939 211 322</p>
    </div>

    <div>
      <h4>E-MAIL</h4>
      <p>GERAL@MAISATRINDADE.PT</p>
    </div>

    <div>
      <h4>MORADA</h4>
      <p>PORTIMÃO</p>
    </div>

  </div>

  <div class="footer-bottom">
    © MAÍSA TRINDADE ARQUITECTOS
  </div>
</footer>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    lucide.createIcons();
  });
</script>
  
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelector(this.getAttribute('href'))
      .scrollIntoView({ behavior: 'smooth' });
  });
});
</script>
</body>
</html>
