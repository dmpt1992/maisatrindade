<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Maísa Trindade Arquitectos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="manifest" href="images/site.webmanifest">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="line"></div>
  <div class="vertical-text">PROJECTOS NAS REDES SOCIAIS</div>
<div class="socials">
  <a href="https://www.instagram.com/maisatrindadearquitectos" target="_blank">
    <i class="fa-brands fa-instagram"></i>
  </a>

  <a href="https://pt.pinterest.com/maisatrindadearquitectos/" target="_blank">
    <i class="fa-brands fa-pinterest-p"></i>
  </a>

  <a href="https://www.facebook.com/maisatrindadearquitectos/" target="_blank">
    <i class="fa-brands fa-facebook-f"></i>
  </a>
</div>
</div>
<!-- HEADER -->
<header>
<div class="logo">
  <img src="images/lettring.svg" alt="Maísa Trindade">
</div>

  <nav>
    <a href="#contacto">CONTACTOS</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <img src="images/cover.jpg">

  <div class="hero-logo">
    <img src="images/logofullwhite.png" alt="Logo">
  </div>
</section>

<!-- FOOTER -->
<footer id="contacto">
  <div class="footer-grid">

    <div>
      <h4>CONTACTO</h4>
      <p>+351 939 211 322</p>
    </div>

    <div>
      <h4>E-MAIL</h4>
      <p>GERAL@MAISATRINDADE.PT</p>
    </div>

    <div>
      <h4>MORADA</h4>
      <p>PORTIMÃO</p>
    </div>

  </div>

  <div class="footer-bottom">
    © MAÍSA TRINDADE ARQUITECTOS
  </div>
</footer>


  
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelector(this.getAttribute('href'))
      .scrollIntoView({ behavior: 'smooth' });
  });
});
</script>
</body>
</html>
